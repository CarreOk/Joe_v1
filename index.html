<!DOCTYPE html>
<html lang="en">

<head>
    <title> Tic Tac Toe</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style type="text/css">
        body {
            background: linear-gradient(0deg, rgba(2, 0, 36, 0.76) 0%, rgba(116, 116, 181, 0.78) 35%, rgba(163, 233, 247, 0.88) 100%);
        }

        .container {
            grid-template-columns: auto auto auto;
            border-radius: 5px;
            display: grid;
            flex-direction: row;
            align-items: flex-start;
            border: 500px none #1db4fad4;
            border-collapse: collapse;
        }

        .container_001 {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .button {
            background-color: #22282cb4;
            border: none;
            color: white;
            padding: 15px 32px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            position: relative;
        }

        .box:hover {
            background: linear-gradient(180deg, rgba(210, 123, 247, 0.35) 10%, rgba(252, 192, 71, 0.35) 50%);
        }

        .box h3 {
            font-size: 24px;
            color: #3545C5;
            font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
        }

        .box {
            border: 1px solid #fafafad4;
            max-width: 250px;
            width: 100%;
            border-radius: 20%;
            text-align: center;
            display: inline-block;
            min-height: 250px;
            vertical-align: top;
            margin: 15px;
            padding: 10px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        h1 {
            font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
            color: rgba(0, 11, 46, 0.793);
            text-align: center;
        }


    </style>
</head>

<body>
<script>
Joes = [];
Joes["hotdog"] = 4; //hotdog is the key, 4 is the value
Joes["fries"] = 3.50 ;//fries is the key, 3.50 is the value
Joes["soda"] = 1.50 ;//soda is the key, 1.50 is the value
Joes["sauerkraut"] = 1; //sauerkraut is the key, 1 is the value
document.write(Joes["fries"]); //displays 3.50
for (key in Joes);
document.write("Menu: Joe's " + key + " $" + Joes[key] + " - ");
//Output: hotdog $4 - fries $3.50 - soda $1.50 - sauerkraut $1
</script>
<div id="menu"></div>


</body>

</html>
